[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "visual-memory"
version = "0.1.0"
description = "Visual memory system with object detection for TSA Software Development app"
requires-python = ">=3.8"
dependencies = [
    "torch>=2.0.0",
    "transformers>=4.30.0",
    "pillow>=9.0.0",
    "pillow-heif>=0.10.0",
    "ultralytics>=8.0.0",
    "huggingface_hub>=0.16.0",
    "depth-pro @ git+https://github.com/apple/ml-depth-pro.git",
]

[project.scripts]
remember-mode = "remember_mode.main:main"
scan-mode = "scan_mode.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["object_detection*", "embed_image*", "utils*", "remember_mode*", "scan_mode*"]
